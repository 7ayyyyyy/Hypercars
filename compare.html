<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Compare hypercars side by side. Pick 2 or 3 cars and see which wins on power, speed, price, and more.">
  <meta name="theme-color" content="#0a0a0c">
  <title>Compare — Hypercars Encyclopedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23dc2626'/%3E%3Ctext x='50' y='65' font-family='Arial' font-weight='900' font-size='52' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
  <style>
    .compare-pickers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    @media (max-width: 720px) { .compare-pickers { grid-template-columns: 1fr; } }

    .compare-picker {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-5);
    }
    .compare-picker label {
      display: block;
      font-size: var(--fs-tiny);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-text-dim);
      margin-bottom: var(--space-2);
      font-weight: 600;
    }
    .compare-picker select {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      padding: var(--space-3);
      font-family: inherit;
      font-size: var(--fs-small);
      min-height: 44px;
      cursor: pointer;
    }

    .compare-table {
      width: 100%;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      border-collapse: collapse;
    }
    .compare-table th, .compare-table td {
      padding: var(--space-3) var(--space-4);
      text-align: left;
      border-bottom: 1px solid var(--color-border);
      font-size: var(--fs-small);
    }
    .compare-table thead th {
      background: var(--color-bg-elevated);
      font-weight: 700;
      font-family: var(--font-display);
      color: var(--color-text);
    }
    .compare-table tbody tr:last-child td { border-bottom: none; }
    .compare-table .row-label {
      color: var(--color-text-muted);
      font-weight: 500;
      background: var(--color-bg-elevated);
      width: 200px;
    }
    .compare-table .col-value {
      font-weight: 600;
      color: var(--color-text);
    }
    .compare-table .col-value--winner {
      color: var(--color-accent);
      position: relative;
    }
    .compare-table .col-value--winner::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--color-accent);
    }
    .compare-empty {
      text-align: center;
      padding: var(--space-9) var(--space-5);
      color: var(--color-text-muted);
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="site-logo">
        <span class="site-logo__mark">H</span>
        <span>Hypercars</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="garage.html">Garage</a>
        <a href="ranking.html">Ranking</a>
        <a href="compare.html">Compare</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="section">
      <div class="container">
        <div class="section-header">
          <span class="eyebrow reveal">Side by side</span>
          <h1 class="section-header__title reveal">Compare</h1>
          <p class="section-header__lede reveal">Pick two or three cars from the encyclopedia and see them head-to-head. The winner of each row is highlighted.</p>
        </div>

        <div class="compare-pickers" id="compare-pickers">
          <!-- 3 dropdowns rendered by JS -->
        </div>

        <div id="compare-output">
          <div class="compare-empty">
            <h3 style="color: var(--color-text); margin-bottom: var(--space-2);">Choose at least 2 cars to compare</h3>
            <p>Use the dropdowns above.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div>© <span data-current-year>2026</span> Hypercars Encyclopedia.</div>
      <div><a href="about.html">About</a></div>
    </div>
  </footer>

  <script src="assets/data/cars.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/compare.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
